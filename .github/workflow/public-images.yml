name: Publish Images

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        run: |
          docker build \
            -f backend/server/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-server:${{ github.sha }} \
            .

      - name: Build worker image
        run: |
          docker build \
            -f backend/worker/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-worker:${{ github.sha }} \
            .

      - name: Build client image
        run: |
          docker build \
            -f client/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }} \
            -t ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-client:${{ github.sha }} \
            ./client

      - name: Push server image
        run: docker push ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-server:${{ github.sha }}

      - name: Push worker image
        run: docker push ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-worker:${{ github.sha }}

      - name: Push client image
        run: docker push ghcr.io/${{ github.repository_owner }}/fullstack-ai-chatbot-client:${{ github.sha }}
