name: CI

on:
  push:
    branches:
      - master

jobs:
  backend:
    name: Python backend and worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis/redis-stack-server:7.2.0-v11
        ports:
          - 6379:6379

    env:
      APP_ENV: test
      DATABASE_PRIMARY_URL: sqlite+pysqlite:///:memory
      DATABASE_REPLICA_URL: ""
      DATABASE_READ_FROM_REPLICA: "false"
      DATABASE_ALLOW_REPLICA_FALLBACK: "true"
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-jwt-secret
      REFRESH_JWT_SECRET: test-refresh-jwt-secret
      VERIFY_JWT_SECRET: test-verify-jwt-secret
      EXPIRES_IN: "60"
      HASH_SALT: test-hash-salt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-timeout

      - name: Install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis..."
            sleep 1
          done

      - name: Run pytest
        run: |
          pytest -q --maxfail=1 --durations=10 --junitxml=pytest-results.xml --timeout=300

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml

  client:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
